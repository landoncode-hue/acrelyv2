services:
  postgres:
    image: postgres:16-alpine
    container_name: acrely-postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-acrely_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secure_dev_pw}
      - POSTGRES_DB=${POSTGRES_DB:-acrely_prod}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: acrely-minio
    restart: always
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  minio_data:
